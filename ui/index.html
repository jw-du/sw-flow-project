<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW投研工作流</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  </script>
  <style>
    :root {
      --primary: #2563eb;
      --bg-color: #f3f4f6;
      --chat-bg: #ffffff;
      --user-msg: #dbeafe;
      --sys-msg: #f8fafc;
      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-light: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }
    
    header { background-color: white; padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; font-weight: 600; color: var(--primary); }
    
    main { flex: 1; display: flex; overflow: hidden; }
    
    .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); max-width: 800px; margin: 0 auto; width: 100%; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
    
    .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    
    .msg-row { display: flex; flex-direction: column; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.system { align-items: flex-start; }
    
    .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; word-wrap: break-word; }
    .msg-row.user .msg-bubble { background-color: var(--user-msg); border-bottom-right-radius: 0; }
    .msg-row.system .msg-bubble { background-color: var(--sys-msg); border: 1px solid var(--border-color); border-bottom-left-radius: 0; }
    
    .msg-bubble pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 4px; overflow-x: auto; margin-top: 8px; }
    .msg-bubble code { font-family: monospace; }
    
    .flow-card { border: 1px solid var(--primary); border-radius: 8px; padding: 16px; margin-top: 12px; background-color: #eff6ff; }
    .flow-card h3 { margin-bottom: 8px; color: var(--primary); font-size: 1.1rem; }
    .flow-card p { font-size: 0.9rem; color: var(--text-light); margin-bottom: 12px; }
    .flow-card .meta { font-size: 0.85rem; color: #475569; margin-bottom: 16px; background: white; padding: 8px; border-radius: 4px; }
    .flow-card .actions { display: flex; gap: 12px; }
    .flow-card button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .flow-card button.primary { background-color: var(--primary); color: white; }
    .flow-card button.primary:hover { background-color: #1d4ed8; }
    .flow-card button.secondary { background-color: white; border: 1px solid var(--border-color); color: var(--text-main); }
    
    .input-area { padding: 16px 24px; border-top: 1px solid var(--border-color); background: white; display: flex; gap: 12px; }
    .input-area input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 24px; outline: none; font-size: 1rem; transition: border-color 0.2s; }
    .input-area input:focus { border-color: var(--primary); }
    .input-area button { background-color: var(--primary); color: white; border: none; border-radius: 24px; padding: 0 24px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
    .input-area button:hover { background-color: #1d4ed8; }
    .input-area button:disabled { background-color: #94a3b8; cursor: not-allowed; }
    
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Mermaid container */
    .mermaid-preview { background: white; padding: 16px; border-radius: 4px; margin-bottom: 16px; border: 1px solid #e2e8f0; overflow-x: auto; text-align: center; }
  </style>
</head>
<body>

  <header>
    <h1>SW投研工作流</h1>
    <div style="font-size: 0.9rem; color: var(--text-light);">执行引擎</div>
  </header>

  <main>
    <div class="chat-container">
      <div class="messages" id="chat-messages">
        <!-- 初始欢迎语 -->
        <div class="msg-row system">
          <div class="msg-bubble">
            👋 你好！我是投研 Agent。请告诉我你需要做什么？
            <br><br>
            <span style="font-size: 0.9rem; color: var(--text-light);">例如："帮我整理一下最近关于房地产的市场情绪，看看有没有利好政策"</span>
          </div>
        </div>
      </div>
      
      <div class="input-area">
        <input type="text" id="user-input" placeholder="输入您的投研需求..." autocomplete="off" onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    // 当前上下文中提炼的参数
    let currentExtractedParams = {};
    let currentGeneratedFlow = null;

    function handleEnter(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    }

    function appendMessage(role, contentHtml) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;
      row.innerHTML = `<div class="msg-bubble">${contentHtml}</div>`;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMarkdownSafe(markdownText) {
      if (window.marked && typeof window.marked.parse === 'function') {
        return window.marked.parse(markdownText);
      }
      return `<pre style="white-space:pre-wrap;background:#fff;padding:12px;border-radius:6px;border:1px solid #e2e8f0;">${escapeHtml(markdownText)}</pre>`;
    }

    async function renderMermaidSafe(containerId, mermaidCode, steps) {
      const container = document.getElementById(containerId);
      if (!container) return;
      if (!mermaidCode || !window.mermaid || typeof window.mermaid.render !== 'function') {
        const fallback = (steps || []).map((s, i) => `${i + 1}. ${s.name || s.id || '未命名步骤'}`).join('<br>');
        container.innerHTML = `<div style="font-size:12px;color:#334155;text-align:left;line-height:1.6;">${fallback || '未返回流程图与步骤信息'}</div>`;
        return;
      }
      try {
        window.mermaid.initialize({ startOnLoad: false, theme: 'default' });
        const { svg } = await window.mermaid.render('svg-' + Math.random().toString(36).slice(2), mermaidCode);
        container.innerHTML = svg;
        const svgEl = container.querySelector('svg');
        if (svgEl) {
          svgEl.style.maxWidth = '100%';
          svgEl.style.height = 'auto';
        }
      } catch (e) {
        const fallback = (steps || []).map((s, i) => `${i + 1}. ${s.name || s.id || '未命名步骤'}`).join('<br>');
        const escaped = escapeHtml(mermaidCode || '');
        container.innerHTML = `<div style="color:red;font-size:12px;margin-bottom:8px;">渲染失败: ${escapeHtml(e?.message || '未知错误')}</div><div style="font-size:12px;color:#334155;text-align:left;line-height:1.6;">${fallback || '无可展示步骤'}</div><details style="margin-top:8px;text-align:left;"><summary style="font-size:12px;color:#64748b;cursor:pointer;">查看 Mermaid 源码</summary><pre style="font-size:12px;background:#0f172a;color:#e2e8f0;padding:8px;border-radius:4px;overflow:auto;">${escaped}</pre></details>`;
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      
      // 显示用户消息
      appendMessage('user', text);
      inputEl.value = '';
      
      // 禁用输入
      inputEl.disabled = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<div class="loading"></div>';
      
      try {
        // 阶段 1: Match
        const res = await fetch('/chat/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: text, topk: 1 })
        });
        
        const data = await res.json();
        
        if (data.candidates && data.candidates.length > 0 && data.candidates[0].score >= 0.8) {
          const flow = data.candidates[0];
          currentExtractedParams = data.intent.extracted_params || {};
          
          // 渲染候选卡片 (阶段 2: Confirm)
          renderFlowCard(flow);
        } else {
          // Score too low or no candidates -> Scenario 2 Trigger
          const cardHtml = `
            <div class="flow-card">
              <h3>未找到完全匹配的工作流</h3>
              <p>系统可以利用现有技能为您动态生成一个专属工作流。</p>
              <div class="actions">
                <button class="primary" onclick="generateFlow('${text}')">让 AI 自动生成</button>
                <button class="secondary" onclick="cancelFlow()">取消</button>
              </div>
            </div>
          `;
          appendMessage('system', cardHtml);
        }
      } catch (err) {
        appendMessage('system', `<span style="color:red">请求出错: ${err.message}</span>`);
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        sendBtn.innerText = '发送';
        inputEl.focus();
      }
    }

    function renderFlowCard(flow) {
      // 生成一个唯一的 ID 供 mermaid 渲染
      const mermaidId = 'mermaid-' + Math.random().toString(36).substr(2, 9);
      
      const cardHtml = `
        <div class="flow-card">
          <h3>推荐 Flow: ${flow.name}</h3>
          ${flow.mermaid_code ? `<div class="mermaid-preview" id="${mermaidId}-container">
             <div class="loading" style="border-top-color: var(--primary);"></div> <span style="font-size:12px;color:#666;">正在渲染流程图...</span>
          </div>` : `<div class="meta">该 Flow 暂无流程图展示。</div>`}
          <div class="actions">
            <button class="primary" onclick="executeFlow('${flow.flow_id}')">确认并执行</button>
            <button class="secondary" onclick="cancelFlow()">取消</button>
          </div>
        </div>
      `;
      appendMessage('system', cardHtml);
      
      // 如果有 mermaid 代码，触发渲染
      if (flow.mermaid_code && window.mermaid) {
        setTimeout(async () => {
          try {
            const { svg } = await window.mermaid.render('svg-' + mermaidId, flow.mermaid_code);
            const container = document.getElementById(`${mermaidId}-container`);
            if (container) {
                container.innerHTML = svg;
                // 调整一下 svg 的样式使其自适应
                const svgEl = container.querySelector('svg');
                if (svgEl) {
                    svgEl.style.maxWidth = '100%';
                    svgEl.style.height = 'auto';
                }
            }
          } catch (e) {
            console.error('Mermaid render error:', e);
            const container = document.getElementById(`${mermaidId}-container`);
            if (container) {
                const escapedCode = flow.mermaid_code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                container.innerHTML = `<div style="color:red;font-size:12px;margin-bottom:8px;">流程图渲染失败: ${e.message}</div><pre style="font-size:12px;text-align:left;background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:4px;overflow-x:auto;"><code>${escapedCode}</code></pre>`;
            }
          }
        }, 100);
      }
    }

    function cancelFlow() {
      appendMessage('system', '已取消执行。');
    }

    async function generateFlow(query) {
      appendMessage('system', `正在为您生成专属工作流，请稍候... <div class="loading" style="border-top-color: var(--primary); vertical-align: middle; width: 14px; height: 14px; border-width: 2px;"></div>`);
      
      try {
        const res = await fetch('/flow/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query })
        });
        
        const data = await res.json();
        if (res.ok) {
          currentGeneratedFlow = data;
          
          const mermaidId = 'mermaid-temp-' + Math.random().toString(36).substr(2, 9);
          
          const cardHtml = `
            <div class="flow-card" style="border-color: #10b981; background-color: #f0fdf4;">
              <h3 style="color: #047857;">✨ 动态生成 Flow: ${data.name}</h3>
              <p>${data.description}</p>
              <div class="mermaid-preview" id="${mermaidId}-container">
                 <div class="loading" style="border-top-color: #047857;"></div> <span style="font-size:12px;color:#666;">正在渲染动态流程图...</span>
              </div>
              <div class="actions">
                <button class="primary" style="background-color: #10b981;" onclick="executeTempFlow()">执行此工作流</button>
                <button class="secondary" onclick="saveTempFlow()">💾 一键保存</button>
                <button class="secondary" onclick="cancelFlow()">取消</button>
              </div>
            </div>
          `;
          appendMessage('system', cardHtml);
          
          setTimeout(() => renderMermaidSafe(`${mermaidId}-container`, data.mermaid_code, data.steps), 80);
        } else {
          appendMessage('system', `<span style="color:red">生成失败: ${data.detail || '未知错误'}</span>`);
        }
      } catch (err) {
        appendMessage('system', `<span style="color:red">请求出错: ${err.message}</span>`);
      }
    }

    async function executeTempFlow() {
      if (!currentGeneratedFlow) return;
      appendMessage('system', `🚀 开始执行临时 Flow: <b>${currentGeneratedFlow.name}</b>... 请稍候。`);
      
      let inputs = {
        ...currentExtractedParams,
        lookback_days: 7,
        output_path: `report_${Date.now()}.md`
      };

      try {
        const vres = await fetch('/flow/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            flow_id: "temp_generated_flow",
            inputs: inputs,
            steps: currentGeneratedFlow.steps,
            input_schema: currentGeneratedFlow.inputs
          })
        });
        const vdata = await vres.json();
        if (vres.ok && vdata?.ok === false) {
          const missing = vdata?.issues?.missing_inputs || [];
          if (Array.isArray(missing) && missing.length > 0) {
            const filled = {};
            for (const key of missing) {
              const schema = currentGeneratedFlow.inputs?.[key] || {};
              const hint = schema.description ? `（${schema.description}）` : '';
              const value = prompt(`请补充参数 ${key}${hint}:`, '');
              if (value === null) {
                appendMessage('system', '已取消执行，缺少必填输入。');
                return;
              }
              filled[key] = value;
            }
            inputs = { ...inputs, ...filled };
          }
          const mismatch = vdata?.issues?.field_mismatch || [];
          const missingSources = vdata?.issues?.missing_sources || [];
          if (mismatch.length > 0 || missingSources.length > 0) {
            appendMessage('system', `⚠️ 发现字段对齐风险，系统将继续尝试执行。建议后续优化该 Flow。`);
          }
        }

        let res = await fetch('/flow/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            flow_id: "temp_generated_flow", 
            inputs: inputs,
            steps: currentGeneratedFlow.steps,
            input_schema: currentGeneratedFlow.inputs
          })
        });
        let data = await res.json();

        if (!res.ok) {
          const missing = data?.detail?.missing_inputs;
          if (Array.isArray(missing) && missing.length > 0) {
            const filled = {};
            for (const key of missing) {
              const schema = currentGeneratedFlow.inputs?.[key] || {};
              const hint = schema.description ? `（${schema.description}）` : '';
              const value = prompt(`请补充参数 ${key}${hint}:`, '');
              if (value === null) {
                appendMessage('system', '已取消执行，缺少必填输入。');
                return;
              }
              filled[key] = value;
            }
            inputs = { ...inputs, ...filled };
            res = await fetch('/flow/execute', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                flow_id: "temp_generated_flow",
                inputs: inputs,
                steps: currentGeneratedFlow.steps,
                input_schema: currentGeneratedFlow.inputs
              })
            });
            data = await res.json();
          }
        }

        if (!res.ok) {
          appendMessage('system', `❌ 执行失败：${data?.detail?.message || data?.detail || '未知错误'}`);
          return;
        }

        handleExecuteResponse(data);
      } catch (err) {
        appendMessage('system', `<span style="color:red">执行请求出错: ${err.message}</span>`);
      }
    }

    async function saveTempFlow() {
      if (!currentGeneratedFlow) return;
      const newName = prompt("请输入要保存的工作流名称:", currentGeneratedFlow.name);
      if (!newName) return;
      const newDesc = prompt("请输入描述:", currentGeneratedFlow.description);
      
      try {
        const payload = {
            ...currentGeneratedFlow,
            name: newName,
            description: newDesc || currentGeneratedFlow.description
        };
        const res = await fetch('/flow/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
            appendMessage('system', `✅ 工作流已成功保存至 <b>${data.file}</b>，日后可直接复用！`);
        } else {
            const detail = data?.detail;
            const msg = typeof detail === 'string' ? detail : (detail?.message || JSON.stringify(detail || data));
            appendMessage('system', `❌ 保存失败: ${msg}`);
        }
      } catch (err) {
        appendMessage('system', `<span style="color:red">请求出错: ${err.message}</span>`);
      }
    }

    function handleExecuteResponse(data) {
        const exec = data.execution;
        
        if (exec.status === 'success') {
          let finalResultHtml = '✅ <b>执行成功！</b><br><br>';
          finalResultHtml += '<ul style="margin-bottom: 16px; padding-left: 20px; font-size: 0.9rem;">';
          exec.step_results.forEach(s => {
            finalResultHtml += `<li>步骤 [${s.step_id}]: ${s.status === 'success' ? '✅' : '❌'}</li>`;
          });
          finalResultHtml += '</ul>';

          const context = exec.outputs.context || {};
          const report = context.final_report || context.steps?.sentiment_step || context.steps?.[exec.step_results[exec.step_results.length-1].step_id];
          
          if (report) {
            finalResultHtml += `<div style="background:#fff; padding:16px; border-radius:8px; border:1px solid #e2e8f0; margin-top:16px;">`;
            const markdownText = typeof report === 'string' ? report : (report.text || JSON.stringify(report, null, 2));
            finalResultHtml += renderMarkdownSafe(markdownText);
            finalResultHtml += `</div>`;
          }

          appendMessage('system', finalResultHtml);
        } else {
          let errHtml = `❌ <b>执行失败</b><br><ul>`;
          exec.step_results.forEach(s => {
            if (s.status === 'failed') {
              errHtml += `<li>步骤 [${s.step_id}]: ${s.error}</li>`;
            }
          });
          errHtml += `</ul>`;
          appendMessage('system', errHtml);
        }
    }

    async function executeFlow(flowId) {
      appendMessage('system', `🚀 开始执行 Flow: <b>${flowId}</b>... 请稍候。`);
      
      // 构造输入参数 (这里默认传入提取的参数，加点默认值)
      const inputs = {
        ...currentExtractedParams,
        lookback_days: 7,
        output_path: `report_${Date.now()}.md`
      };

      try {
        // 阶段 3: Execute
        const res = await fetch('/flow/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ flow_id: flowId, inputs: inputs })
        });
        
        handleExecuteResponse(await res.json());
        
      } catch (err) {
        appendMessage('system', `<span style="color:red">执行请求出错: ${err.message}</span>`);
      }
    }
  </script>
</body>
</html>
